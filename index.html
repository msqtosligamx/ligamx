<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga MX Survivor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background: #1a1a1a; color: white; }
        .card { background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); max-width: 1200px; margin: auto; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        input { background: #404040; color: white; }
        button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-full { width: 100%; margin: 10px 0; }
        .btn-verde { background: #00c853; color: white; }
        .btn-verde:hover { background: #00a042; }
        .btn-gris { background: #555; color: white; }
        .btn-gris:hover { background: #444; }
        .vidas { font-size: 28px; color: #ff5252; margin: 20px 0; }
        #game-section { display: none; }
        .hidden { display: none; }
        .tabla-container { width: 100%; overflow-x: auto; }
        th, td { white-space: nowrap; }
    </style>
</head>
<body>

<div class="card">
    <h1>&#127942; LIGA MX <br>SURVIVOR</h1>

    <!-- LOGIN -->
    <div id="auth-section">
        <p>Ingresa para jugar</p>
        <input type="email" id="email" placeholder="Correo electronico">
        <input type="password" id="password" placeholder="Contrasena">
        <button id="btn-login" class="btn-full btn-verde">ENTRAR / REGISTRARSE</button>
    </div>

    <!-- JUEGO -->
    <div id="game-section">
        <p>Bienvenido: <strong id="user-display"></strong></p>
        <div class="vidas">Vidas: <span id="vidas-count">3</span> &#10084;&#65039;</div>
        <hr>

        <p>Elige tu equipo de la Jornada</p>
        <p id="jornada-label" style="color:#aaa; margin:5px 0;">Detectando jornada...</p>
        <select id="team-select">
            <option value="">Cargando equipos...</option>
        </select>
        <button id="btn-save" class="btn-full btn-verde">CONFIRMAR EQUIPO</button>
        <p id="feedback"></p>

        <hr>
        <h3>Panel de Supervivencia</h3>
        <div class="tabla-container">
            <table style="width:100%; border-collapse:collapse; color:white;">
                <thead>
                    <tr id="header-jornadas" style="background:#333;">
                        <th style="padding:10px; border:1px solid #555;">Usuario</th>
                        <th style="padding:10px; border:1px solid #555;">Vidas</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-survivor"></tbody>
            </table>
        </div>

        <hr style="margin:30px 0;">
        <h3>&#128197; Partidos Liga MX</h3>
        <div style="display:flex; gap:10px; justify-content:center; margin-bottom:15px; flex-wrap:wrap;">
            <button id="btn-pasados" class="btn-gris" onclick="verSemana('pasados')" style="padding:8px 20px;">Semana pasada</button>
            <button id="btn-proximos" class="btn-verde" onclick="verSemana('proximos')" style="padding:8px 20px;">Esta semana</button>
            <button id="btn-siguiente" class="btn-gris" onclick="verSemana('siguiente')" style="padding:8px 20px;">Próxima semana</button>
        </div>
        <div id="seccion-calendario">
            <p style="color:#aaa;">Cargando partidos...</p>
        </div>

        <!-- SECCIÓN ADMIN - solo visible para administrador -->
        <div id="admin-section" style="display:none; margin-top:30px; border-top: 2px solid #ff5252; padding-top:20px;">
            <h3 style="color:#ff5252;">⚙️ Panel Admin</h3>
            <p style="color:#aaa; font-size:13px;">Ejecuta el verificador manualmente cuando una jornada ya terminó.</p>
            <button id="btn-verificar" class="btn-full" style="background:#ff5252; color:white; margin-bottom:10px;"
                onclick="correrVerificador()">
                ▶ CORRER VERIFICADOR AHORA
            </button>
            <p id="admin-feedback" style="color:#aaa;"></p>
        </div>

    </div>
</div>

<script>
    const SB_URL = "https://povaakggggoeewgqfyot.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvdmFha2dnZ2dvZWV3Z3FmeW90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMjMzODMsImV4cCI6MjA4NzY5OTM4M30.HqtFd95Ot8P3DxjgGLIz40SuxBPJiB-9DavvcCSInHA";
    const RENDER_URL = "https://ligamx-pjcd.onrender.com";

    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    let userActual = null;
    let vistaCalendario = 'proximos';

    // LOGIN
    document.getElementById('btn-login').onclick = async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('btn-login');

        if (!email || !password) { alert("Escribe correo y contrasena"); return; }

        btn.disabled = true;
        btn.innerText = "Cargando...";

        try {
            let { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                const { data: regData, error: eReg } = await supabaseClient.auth.signUp({ email, password });
                if (eReg) { alert("Error al registrar: " + eReg.message); return; }
                if (regData && regData.user) {
                    userActual = regData.user;
                } else {
                    alert("Cuenta creada. Presiona Entrar de nuevo.");
                    return;
                }
            } else {
                userActual = data.user;
            }

            iniciarJuego();

        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "ENTRAR / REGISTRARSE";
        }
    };

    // INICIAR JUEGO
    async function iniciarJuego() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('game-section').style.display = 'block';
        document.getElementById('user-display').innerText = userActual.email;

        // Crear perfil si no existe
        const { data: perfilExiste } = await supabaseClient
            .from('perfiles').select('id').eq('id', userActual.id).single();

        if (!perfilExiste) {
            await supabaseClient.from('perfiles').insert([{
                id: userActual.id,
                username: userActual.email,
                vidas: 3,
                eliminado: false
            }]);
        }

        // Cargar vidas
        const { data: perfil } = await supabaseClient
            .from('perfiles').select('vidas').eq('id', userActual.id).single();
        if (perfil) document.getElementById('vidas-count').innerText = perfil.vidas;

        // Cargar equipos
        const { data: equipos } = await supabaseClient.from('equipos_ligamx').select('*');
        const select = document.getElementById('team-select');
        select.innerHTML = equipos.map(e => "<option value='" + e.id + "'>" + e.nombre + "</option>").join('');

        cargarTablaGlobal();
        cargarCalendario();
        detectarJornadaSiguiente();
        mostrarAdminSiAplica();
    }

    // JORNADA SIGUIENTE - se detecta automáticamente
    var jornadaSiguiente = null;

    async function detectarJornadaSiguiente() {
        var roundActual = await detectarRoundActual();
        jornadaSiguiente = roundActual + 1;

        var label = document.getElementById('jornada-label');
        var btnSave = document.getElementById('btn-save');
        var fb = document.getElementById('feedback');

        label.innerText = 'Jornada ' + jornadaSiguiente + ' - Clausura 2026';
        label.style.color = '#00c853';
        label.style.fontWeight = 'bold';
        label.style.fontSize = '18px';

        // Verificar si ya eligió para esta jornada
        var { data: yaExiste } = await supabaseClient
            .from('selecciones')
            .select('id, equipos_ligamx(nombre)')
            .eq('user_id', userActual.id)
            .eq('jornada', jornadaSiguiente)
            .single();

        if (yaExiste) {
            var nombreEquipo = yaExiste.equipos_ligamx ? yaExiste.equipos_ligamx.nombre : 'tu equipo';
            fb.innerText = 'Ya elegiste ' + nombreEquipo + ' para la Jornada ' + jornadaSiguiente + '.';
            fb.style.color = '#aaa';
            btnSave.disabled = true;
            btnSave.style.background = '#555';
            btnSave.style.cursor = 'not-allowed';
            document.getElementById('team-select').disabled = true;
        } else {
            btnSave.disabled = false;
            btnSave.style.background = '#00c853';
            btnSave.style.cursor = 'pointer';
            document.getElementById('team-select').disabled = false;
        }
    }

    // GUARDAR SELECCION
    document.getElementById('btn-save').onclick = async () => {
        const eqId = document.getElementById('team-select').value;

        if (!jornadaSiguiente) { alert("Espera, detectando jornada..."); return; }
        if (!eqId) { alert("Selecciona un equipo"); return; }

        // Verificar si ya usó este equipo en una jornada anterior
        const { data: equipoRepetido } = await supabaseClient
            .from('selecciones')
            .select('jornada')
            .eq('user_id', userActual.id)
            .eq('equipo_id', eqId)
            .single();

        if (equipoRepetido) {
            const fb = document.getElementById('feedback');
            fb.innerText = "Ya usaste ese equipo en la Jornada " + equipoRepetido.jornada + ". Elige otro.";
            fb.style.color = "#ff5252";
            return;
        }

        const { error } = await supabaseClient.from('selecciones').insert([{
            user_id: userActual.id,
            equipo_id: eqId,
            jornada: jornadaSiguiente,
            estatus: 'pendiente'
        }]);

        if (error) {
            alert("ERROR: " + error.message + " | " + error.details);
        } else {
            const fb = document.getElementById('feedback');
            fb.innerText = "Eleccion guardada para la Jornada " + jornadaSiguiente + "!";
            fb.style.color = "#00c853";
            // Bloquear el botón después de guardar
            document.getElementById('btn-save').disabled = true;
            document.getElementById('btn-save').style.background = '#555';
            document.getElementById('btn-save').style.cursor = 'not-allowed';
            document.getElementById('team-select').disabled = true;
            cargarTablaGlobal();
        }
    };

    // TABLA GLOBAL
    async function cargarTablaGlobal() {
        const { data: perfiles } = await supabaseClient
            .from('perfiles').select('id, username, vidas').order('vidas', { ascending: false });
        const { data: selecciones } = await supabaseClient
            .from('selecciones').select('*, equipos_ligamx(nombre)');

        const cuerpo = document.getElementById('cuerpo-survivor');
        const header = document.getElementById('header-jornadas');
        const maxJornada = 17;

        header.innerHTML = '<th style="padding:10px; border:1px solid #555;">Usuario</th>'
                         + '<th style="padding:10px; border:1px solid #555;">Vidas</th>';
        for (let i = 1; i <= maxJornada; i++) {
            header.innerHTML += '<th style="padding:10px; border:1px solid #555;">J' + i + '</th>';
        }

        cuerpo.innerHTML = perfiles.map(function(p) {
            let celdas = '';
            for (let j = 1; j <= maxJornada; j++) {
                const sel = selecciones.find(function(s) { return s.user_id === p.id && s.jornada === j; });
                let estilo = 'background:#444;';
                let texto = '-';
                if (sel) {
                    texto = (sel.equipos_ligamx && sel.equipos_ligamx.nombre) ? sel.equipos_ligamx.nombre : 'S/N';
                    if (sel.estatus === 'fallo')        estilo = 'background:#cc0000; color:white;';
                    else if (sel.estatus === 'acierto') estilo = 'background:#008000; color:white;';
                    else                                estilo = 'background:#555; color:#ccc;';
                }
                celdas += '<td style="padding:8px; border:1px solid #555; text-align:center; ' + estilo + '">' + texto + '</td>';
            }
            const colorVidas = p.vidas > 0 ? '#00c853' : '#ff5252';
            return '<tr>'
                + '<td style="padding:8px; border:1px solid #555; font-weight:bold;">' + (p.username || 'Anon') + '</td>'
                + '<td style="padding:8px; border:1px solid #555; text-align:center; font-weight:bold; color:' + colorVidas + '">' + p.vidas + '</td>'
                + celdas
                + '</tr>';
        }).join('');
    }

    // CALENDARIO
    // TheSportsDB reutiliza el mismo intRound para Apertura y Clausura
    // La diferencia es el año: Apertura=2025, Clausura=2026
    // Filtramos por año en dateEvent para mostrar solo los del torneo correcto

    async function fetchJornada(round) {
        var url = 'https://www.thesportsdb.com/api/v1/json/123/eventsround.php?id=4350&r=' + round + '&s=2025-2026';
        var response = await fetch(url);
        var data = await response.json();
        var todos = data.events || [];
        // Solo partidos de 2026 (Clausura)
        return todos.filter(function(e) { return e.dateEvent && e.dateEvent.startsWith('2026'); });
    }

    // Detectar jornada actual buscando el round que tenga partidos en 2026
    // y cuya fecha más reciente sea <= hoy GMT-6
    async function detectarRoundActual() {
        var ahoraUTC = new Date();
        var roundActual = 11; // fallback seguro: jornada 11 ya jugada
        // Probamos rounds del 17 al 1 buscando el más reciente con partidos en 2026
        for (var r = 17; r >= 1; r--) {
            var eventos = await fetchJornada(r);
            if (eventos.length > 0) {
                // Verificar si al menos un partido ya pasó en UTC
                var algunoPaso = eventos.some(function(e) {
                    return new Date(e.strTimestamp) <= ahoraUTC;
                });
                if (algunoPaso) {
                    roundActual = r;
                    break;
                }
            }
        }
        // Seguridad: nunca devolver menos de 11 (jornadas anteriores ya jugadas)
        return Math.max(roundActual, 11);
    }

    function renderTablaPartidos(eventos, titulo) {
        if (eventos.length === 0) {
            return '<p style="color:#aaa;">No hay partidos disponibles para ' + titulo + '.</p>';
        }

        eventos.sort(function(a, b) {
            return new Date(a.strTimestamp) - new Date(b.strTimestamp);
        });

        var html = '<p style="color:#aaa; margin-bottom:8px; font-weight:bold;">' + titulo + '</p>'
                 + '<div class="tabla-container"><table style="width:100%; border-collapse:collapse; color:white;">'
                 + '<thead><tr style="background:#333;">'
                 + '<th style="padding:8px; border:1px solid #555;">Fecha</th>'
                 + '<th style="padding:8px; border:1px solid #555;">Local</th>'
                 + '<th style="padding:8px; border:1px solid #555;">Marcador</th>'
                 + '<th style="padding:8px; border:1px solid #555;">Visitante</th>'
                 + '</tr></thead><tbody>';

        eventos.forEach(function(p) {
            // strTimestamp viene en UTC, México siempre es GMT-6 (no cambia horario)
            var fechaUTC = new Date(p.strTimestamp);
            var fechaGMT6 = new Date(fechaUTC.getTime() - 6 * 60 * 60 * 1000);

            var dias  = ['dom','lun','mar','mié','jue','vie','sáb'];
            var meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
            var dia    = dias[fechaGMT6.getUTCDay()];
            var numDia = fechaGMT6.getUTCDate();
            var mes    = meses[fechaGMT6.getUTCMonth()];
            var hh     = String(fechaGMT6.getUTCHours()).padStart(2,'0');
            var mm     = String(fechaGMT6.getUTCMinutes()).padStart(2,'0');
            var hora   = hh + ':' + mm;
            var fecha  = dia + ' ' + numDia + ' ' + mes + ', ' + hora;

            var local  = p.strHomeTeam;
            var visita = p.strAwayTeam;
            var marcador;
            if (p.intHomeScore !== null && p.intHomeScore !== '' && p.intHomeScore !== undefined) {
                marcador = '<strong>' + p.intHomeScore + ' - ' + p.intAwayScore + '</strong>';
            } else {
                marcador = '<span style="color:#aaa;">' + hora + '</span>';
            }

            html += '<tr>'
                  + '<td style="padding:8px; border:1px solid #555; font-size:13px;">' + fecha + '</td>'
                  + '<td style="padding:8px; border:1px solid #555;">' + local + '</td>'
                  + '<td style="padding:8px; border:1px solid #555; text-align:center;">' + marcador + '</td>'
                  + '<td style="padding:8px; border:1px solid #555;">' + visita + '</td>'
                  + '</tr>';
        });

        html += '</tbody></table></div>';
        return html;
    }

    async function cargarCalendario() {
        var div = document.getElementById('seccion-calendario');
        div.innerHTML = '<p style="color:#aaa;">Cargando...</p>';

        try {
            var roundActual = await detectarRoundActual();
            var round;
            if (vistaCalendario === 'pasados')   round = roundActual - 1;
            else if (vistaCalendario === 'proximos') round = roundActual;
            else round = roundActual + 1; // siguiente

            var titulo = 'Jornada ' + round + ' - Clausura 2026';
            var eventos = await fetchJornada(round);
            div.innerHTML = renderTablaPartidos(eventos, titulo);

        } catch (e) {
            div.innerHTML = '<p style="color:#ff5252;">Error: ' + e.message + '</p>';
            console.error(e);
        }
    }

    // ADMIN
    const ADMIN_EMAIL = 'greenday_115@hotmail.com';
    const RENDER_URL_VERIFICADOR = 'https://ligamx-pjcd.onrender.com/api/verificar';

    function mostrarAdminSiAplica() {
        if (userActual && userActual.email === ADMIN_EMAIL) {
            document.getElementById('admin-section').style.display = 'block';
        }
    }

    async function correrVerificador() {
        var btn = document.getElementById('btn-verificar');
        var fb  = document.getElementById('admin-feedback');

        btn.disabled = true;
        btn.innerText = 'Ejecutando...';
        fb.innerText = 'Conectando con el servidor...';
        fb.style.color = '#aaa';

        try {
            var response = await fetch(RENDER_URL_VERIFICADOR, { method: 'POST' });
            var data = await response.json();

            if (data.success) {
                fb.innerText = '✅ ' + (data.mensaje || 'Verificacion completada.');
                fb.style.color = '#00c853';
                cargarTablaGlobal(); // Refrescar tabla con nuevas vidas
            } else {
                fb.innerText = '❌ Error: ' + (data.error || 'Error desconocido');
                fb.style.color = '#ff5252';
            }
        } catch (e) {
            fb.innerText = '❌ No se pudo conectar con el servidor: ' + e.message;
            fb.style.color = '#ff5252';
        } finally {
            btn.disabled = false;
            btn.innerText = '▶ CORRER VERIFICADOR AHORA';
        }
    }

    function verSemana(tipo) {
        vistaCalendario = tipo;
        document.getElementById('btn-proximos').className  = tipo === 'proximos'  ? 'btn-verde' : 'btn-gris';
        document.getElementById('btn-pasados').className   = tipo === 'pasados'   ? 'btn-verde' : 'btn-gris';
        document.getElementById('btn-siguiente').className = tipo === 'siguiente' ? 'btn-verde' : 'btn-gris';
        cargarCalendario();
    }

</script>
</body>
</html>
